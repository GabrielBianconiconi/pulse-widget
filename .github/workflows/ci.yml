name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore PulseWidget.sln

      - name: Build
        run: dotnet build PulseWidget.sln -c Release --no-restore

      - name: Test
        run: dotnet test PulseWidget.sln -c Release --no-build --collect:"XPlat Code Coverage"

      - name: Audit dependencies
        run: dotnet list PulseWidget.csproj package --vulnerable --include-transitive

      - name: Publish Windows x64
        run: dotnet publish PulseWidget.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o artifacts/publish

      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: pulse-widget-win-x64
          path: artifacts/publish/**
          if-no-files-found: error
