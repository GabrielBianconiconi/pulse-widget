name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Test
        run: dotnet test PulseWidget.sln -c Release

      - name: Publish
        run: dotnet publish PulseWidget.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o artifacts/publish

      - name: Create archive
        shell: pwsh
        run: Compress-Archive -Path artifacts/publish/* -DestinationPath artifacts/PulseWidget-win-x64.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/PulseWidget-win-x64.zip
